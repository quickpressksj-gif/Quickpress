<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickPress – Ironing Pickup & Delivery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <div class="logo">Quick<span>Press</span></div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container hero-wrap">

    <div class="hero-text">
      <h1>
        Kapde Iron Karwana <br>
        <span>Ab 10 Minute Me</span>
      </h1>

      <p>
        Doorstep pickup & delivery with verified ironing partners
      </p>

      <button class="btn primary">
        Order Now
      </button>
    </div>

  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <div class="container">

    <h2 class="section-title">Our Services</h2>

    <div class="services-grid">

      <div class="service-card">
        <div class="service-icon">P</div>
        <h3>Pickup</h3>
        <p>Doorstep clothes pickup</p>
      </div>

      <div class="service-card">
        <div class="service-icon">I</div>
        <h3>Ironing</h3>
        <p>Professional ironing</p>
      </div>

      <div class="service-card">
        <div class="service-icon">D</div>
        <h3>Delivery</h3>
        <p>Fast & safe delivery</p>
      </div>

      <div class="service-card">
        <div class="service-icon">T</div>
        <h3>Tracking</h3>
        <p>Order status updates</p>
      </div>

    </div>
  </div>
</section>

</body>
</html>
