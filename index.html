<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickPress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <div class="logo">Quick<span>Press</span></div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container hero-wrap">
    <div class="hero-text">
      <h1>
        Kapde Iron Karwana <br>
        <span>Ab 10 Minute Me</span>
      </h1>
      <p>Doorstep pickup & delivery</p>
      <button class="btn primary" onclick="openPanel()">Order Now</button>
    </div>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <div class="container">
    <h2 class="section-title">Our Services</h2>

    <div class="services-grid">
      <div class="service-card">
        <div class="service-icon">P</div>
        <h3>Pickup</h3>
        <p>Doorstep pickup</p>
      </div>
      <div class="service-card">
        <div class="service-icon">I</div>
        <h3>Ironing</h3>
        <p>Professional ironing</p>
      </div>
      <div class="service-card">
        <div class="service-icon">D</div>
        <h3>Delivery</h3>
        <p>Fast delivery</p>
      </div>
      <div class="service-card">
        <div class="service-icon">T</div>
        <h3>Tracking</h3>
        <p>Order updates</p>
      </div>
    </div>
  </div>
</section>

<!-- SIDE PANEL -->
<div id="orderPanel" class="side-panel">
  <div class="panel-header">
    <h3 id="panelTitle">Pickup Details</h3>
    <span class="close-btn" onclick="closePanel()">×</span>
  </div>

  <div class="panel-content">

    <!-- PICKUP STEP -->
    <div id="pickupStep">
      <input type="text" placeholder="Full Name">
      <input type="tel" placeholder="Mobile Number">
      <textarea placeholder="Pickup Address"></textarea>
      <button class="btn primary full-btn" onclick="goToDelivery()">Next</button>
    </div>

    <!-- DELIVERY STEP -->
    <div id="deliveryStep" style="display:none;">
      <textarea placeholder="Delivery Address"></textarea>
      <input type="time">
      <button class="btn primary full-btn" onclick="confirmOrder()">Confirm Order</button>
    </div>

    <!-- THANK YOU -->
    <div id="thankYouStep" style="display:none;">
      <h3>✅ Order Placed</h3>
      <p>Our team will contact you shortly.</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
